apiVersion: v1
kind: ConfigMap
metadata:
  name: vod-cache-config
  namespace: edge-cdn
data:
  NODE_ENV: production
  MINIO_ACCESS_KEY: rfdJLfDAM3ROyNrBFmsL
  MINIO_BUCKET_NAME: nami
  MINIO_ENDPOINT: minio.minio-system
  MINIO_PORT: '9000'
  MINIO_SECRET_KEY: 0EE1FqCiWj5EeVGepSCGcHgqKNbDOPI55Qh2r8yj
  MINIO_USE_SSL: 'false'
  PORT: '3000'
  REDIS_HOST: redis-cluster-service.redis-cluster
  REDIS_PORT: '6379'
  VOD_CACHE_REDIS_PREFIX: 'vod_file:'
  VOD_CDN_METRICS_KEY: vod_metrics
  VOD_CDN_HIT_COUNTS_KEY: vod_hit_counts
  VOD_CDN_REQUEST_LOGS: 'false'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vod-cache-cdn
  name: vod-cache-cdn
  namespace: edge-cdn
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vod-cache-cdn
  template:
    metadata:
      labels:
        app: vod-cache-cdn
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - vod-cache-cdn
                topologyKey: kubernetes.io/hostname
              weight: 100
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
        - name: edge-vod-cache
          image: namipsg/manabakh:mcdn-r10
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          ports:
            - containerPort: 3000
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          envFrom:
          - configMapRef:
              name: vod-cache-config
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vod-cache-service
  namespace: edge-cdn
  labels:
    app: vod-cache-cdn
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics/prometheus
    prometheus.io/port: "80"
spec:
  selector:
    app: vod-cache-cdn
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge-vod-ingress
  namespace: edge-cdn
  labels:
    app: edge-cdn
    tier: cdn
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Cache-Layer"
    nginx.ingress.kubernetes.io/cors-expose-headers: "Accept-Ranges,Content-Length,Content-Range,X-Cache-Layer"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - mcdn.manabakh.ir
    secretName: ssl-secret-mcdn
  rules:
  - host: mcdn.manabakh.ir
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vod-cache-service
            port:
              number: 80
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vod-cdn
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
    - edge-cdn
  selector:
    matchLabels:
      app: vod-cache-cdn
  endpoints:
  - port: http
    path: /metrics/prometheus
    interval: 30s
